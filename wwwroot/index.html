<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlazorUltimaDjent</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Play:wght@400;700&display=swap" rel="stylesheet">
    <link href="BlazorUltimaDjent.styles.css" rel="stylesheet" />
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <script>
        window.initReveal = function () {
            // Scroll reveal observer
            const revealObserver = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    if (e.isIntersecting) {
                        e.target.classList.add('visible');
                        revealObserver.unobserve(e.target);
                    }
                });
            }, { threshold: 0.15 });

            document.querySelectorAll('.reveal:not(.visible)')
                .forEach(el => revealObserver.observe(el));

            // Active nav link on scroll
            // Uses the same IntersectionObserver pattern — fires when a section
            // is at least 40% visible, then highlights the matching nav link
            const sections = document.querySelectorAll('section[id]');
            const navLinks  = document.querySelectorAll('.nav-links a');

            const navObserver = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    if (e.isIntersecting) {
                        navLinks.forEach(a => {
                            a.classList.toggle('active', a.getAttribute('href') === '#' + e.target.id);
                        });
                    }
                });
            }, { threshold: 0.4 });

            sections.forEach(s => navObserver.observe(s));
        };
    </script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
